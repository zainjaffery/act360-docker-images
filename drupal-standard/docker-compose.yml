services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DB_NAME: ${DB_NAME:-drupal}
      DB_USER: ${DB_USER:-drupal}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-password}
      DB_HOST: db
      DB_PORT: 3306
      DB_DRIVER: mysql
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # SSH
      SSH_KEYS_URL: ${SSH_KEYS_URL:-}
      SSH_KEYS_TOKEN: ${SSH_KEYS_TOKEN:-}
      # Auto SSH config registration
      SITE_NAME: ${SITE_NAME:-}
      SSH_PORT: ${SSH_PORT:-2222}
      SSH_HOST: ${SSH_HOST:-}
      SSH_CONFIG_REPO: ${SSH_CONFIG_REPO:-}
      SSH_CONFIG_TOKEN: ${SSH_CONFIG_TOKEN:-}
      SSH_CONFIG_FILE: ${SSH_CONFIG_FILE:-dokploy}
    volumes:
      # Mount the project root (parent of system/) into the container
      - ../:/var/www/html
      - drupal_files:/var/www/html/web/sites/default/files
    ports:
      - "${SSH_PORT:-2222}:22"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ../:/var/www/html:ro
      - drupal_files:/var/www/html/web/sites/default/files:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    ports:
      - "80"

  db:
    image: mariadb:11
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --innodb-log-file-size=64M
      --innodb-flush-method=O_DIRECT
    environment:
      MYSQL_DATABASE: ${DB_NAME:-drupal}
      MYSQL_USER: ${DB_USER:-drupal}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-this-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-this-root-password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly no --save "" --maxmemory 64mb --maxmemory-policy allkeys-lru

volumes:
  drupal_files:
  db_data:
  nginx_cache:
