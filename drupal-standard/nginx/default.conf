# FastCGI cache configuration
fastcgi_cache_path /var/cache/nginx/fastcgi levels=1:2 keys_zone=DRUPAL:64m inactive=60m max_size=256m;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

# Detect HTTPS via X-Forwarded-Proto header (set by Traefik/reverse proxies)
map $http_x_forwarded_proto $forwarded_https {
    default off;
    https on;
}

server {
    listen 80;
    server_name _;

    # Drupal web root (Composer-managed projects use web/ as docroot)
    root /var/www/html/web;
    index index.php index.html;

    client_max_body_size 64M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache bypass conditions
    set $skip_cache 0;
    if ($request_method = POST) { set $skip_cache 1; }
    if ($query_string != "") { set $skip_cache 1; }

    # Don't cache admin, login, or Drupal system pages
    if ($request_uri ~* "^/admin|^/user|^/update\.php|^/install\.php|^/cron\.php|^/batch") {
        set $skip_cache 1;
    }

    # Don't cache logged-in users (Drupal session cookies)
    if ($http_cookie ~* "SESS[a-z0-9]+|SSESS[a-z0-9]+|Drupal\.visitor") {
        set $skip_cache 1;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Handle clean URLs for Drupal
    location @rewrite {
        rewrite ^ /index.php;
    }

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS $forwarded_https;

        # FastCGI cache
        fastcgi_cache DRUPAL;
        fastcgi_cache_valid 200 301 302 60m;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache_use_stale error timeout updating invalid_header http_500 http_503;
        fastcgi_cache_lock on;

        add_header X-FastCGI-Cache $upstream_cache_status;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Browser caching for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        log_not_found off;
        access_log off;
    }

    # Drupal files directory
    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @rewrite;
    }

    # Deny access to system/ folder (Docker config files)
    location ^~ /system/ { deny all; }

    # Deny access to sensitive Drupal files
    location ~ /\.ht { deny all; }
    location ~ /xmlrpc.php { deny all; }
    location ~ /update.php { deny all; }
    location ~ /install.php { deny all; }
    location ~ /composer\.(json|lock) { deny all; }
    location ~ /\.env { deny all; }

    # Block access to Drupal core/config files that should not be public
    location ~ ^/sites/.*/private/ { return 403; }
    location ~ ^/sites/[^/]+/settings\.php$ { return 403; }
    location ~ ^/sites/[^/]+/services\.yml$ { return 403; }

    # Deny access to hidden files
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
