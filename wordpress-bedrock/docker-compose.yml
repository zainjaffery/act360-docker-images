services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database (Bedrock reads these from environment)
      DB_NAME: ${DB_NAME:-wordpress}
      DB_USER: ${DB_USER:-wordpress}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-password}
      DB_HOST: db
      # Bedrock environment config
      WP_ENV: ${WP_ENV:-development}
      WP_HOME: ${WP_HOME:-http://localhost}
      WP_SITEURL: ${WP_SITEURL:-${WP_HOME}/wp}
      # Salts (generate at https://roots.io/salts.html)
      AUTH_KEY: ${AUTH_KEY}
      SECURE_AUTH_KEY: ${SECURE_AUTH_KEY}
      LOGGED_IN_KEY: ${LOGGED_IN_KEY}
      NONCE_KEY: ${NONCE_KEY}
      AUTH_SALT: ${AUTH_SALT}
      SECURE_AUTH_SALT: ${SECURE_AUTH_SALT}
      LOGGED_IN_SALT: ${LOGGED_IN_SALT}
      NONCE_SALT: ${NONCE_SALT}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # SSH
      SSH_KEYS_URL: ${SSH_KEYS_URL:-}
      SSH_KEYS_TOKEN: ${SSH_KEYS_TOKEN:-}
      # Auto SSH config registration
      SITE_NAME: ${SITE_NAME:-}
      SSH_PORT: ${SSH_PORT:-2222}
      SSH_HOST: ${SSH_HOST:-}
      SSH_CONFIG_REPO: ${SSH_CONFIG_REPO:-}
      SSH_CONFIG_TOKEN: ${SSH_CONFIG_TOKEN:-}
      SSH_CONFIG_FILE: ${SSH_CONFIG_FILE:-dokploy}
    volumes:
      # Mount the directory containing this compose file into the container
      - ./:/var/www/html
      - bedrock_uploads:/var/www/html/web/app/uploads
    ports:
      # Pin the SSH host port via SSH_PORT env var (defaults to 2222).
      # Use a unique value per site so your ~/.ssh/config entries stay stable.
      - "${SSH_PORT:-2222}:22"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./:/var/www/html:ro
      - bedrock_uploads:/var/www/html/web/app/uploads:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    ports:
      - "80"

  db:
    image: mariadb:11
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=256M
      --max-connections=200
      --innodb-log-file-size=64M
      --innodb-flush-method=O_DIRECT
    environment:
      MYSQL_DATABASE: ${DB_NAME:-wordpress}
      MYSQL_USER: ${DB_USER:-wordpress}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-this-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-this-root-password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly no --save "" --maxmemory 64mb --maxmemory-policy allkeys-lru

volumes:
  bedrock_uploads:
  db_data:
  nginx_cache:
